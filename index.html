<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID STORM — 弾幕シューティング</title>
    <meta name="description" content="ネオンビジュアルの弾幕避けシューティングゲーム。美しい弾幕パターンを避けて生き残れ！">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- HUD -->
        <div id="hud">
            <div id="score-display">
                <span class="hud-label">SCORE</span>
                <span id="score-value">0</span>
            </div>
            <div id="wave-display">
                <span class="hud-label">WAVE</span>
                <span id="wave-value">1</span>
            </div>
            <div id="lives-display">
                <span class="hud-label">LIVES</span>
                <span id="lives-value">♥♥♥</span>
            </div>
        </div>

        <!-- Title Screen -->
        <div id="title-screen" class="overlay">
            <div class="title-content">
                <h1 class="game-title">VOID<br>STORM</h1>
                <p class="subtitle">— 弾幕シューティング —</p>
                <div class="controls-info">
                    <p>🎮 WASD / 矢印キー：移動</p>
                    <p>⚡ Shift：低速移動</p>
                    <p>🔫 クリック / スペース：ショット</p>
                </div>
                <button id="start-btn" class="neon-btn">START GAME</button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-screen" class="overlay" style="display:none;">
            <div class="title-content">
                <h1 class="gameover-title">GAME OVER</h1>
                <p class="final-score">SCORE: <span id="final-score-value">0</span></p>
                <p class="final-wave">WAVE: <span id="final-wave-value">1</span></p>
                <button id="retry-btn" class="neon-btn">RETRY</button>
            </div>
        </div>

        <!-- Wave Announcement -->
        <div id="wave-announce" class="wave-announce" style="display:none;">
            <span class="wave-text">WAVE <span id="wave-announce-num">1</span></span>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
